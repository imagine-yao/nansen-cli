questions:
  # Original question (kept)
  - id: wallet_balance
    question: Show me the portfolio for 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045
    expected_commands:
      - nansen research profiler balance
    expected_fragments:
      - "--address"
      - "--chain"
      - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
    skill: nansen-wallet-profiler

  # Smart money: --smart-money flag on holders (not in --help)
  - id: smart_money_holders
    question: Which smart money wallets hold SOL?
    expected_commands:
      - nansen research token holders
    expected_fragments:
      - "token holders"
      - "--smart-money"
      - "--chain"
    skill: nansen-holder-analysis

  # Smart money: --labels "Fund" on netflow (labels listed in help but usage on specific commands is skill knowledge)
  - id: fund_netflow
    question: What tokens are crypto funds accumulating on Ethereum?
    expected_commands:
      - nansen research smart-money netflow
      - nansen research smart-money holdings
    expected_fragments:
      - "smart-money netflow"
      - '--labels'
      - "Fund"
      - "--chain"
      - "ethereum"
    skill: nansen-fund-tracker

  # Perp: leaderboard --days (skill-specific)
  - id: perp_leaderboard_week
    question: Show me the Hyperliquid perp leaderboard for the past week
    expected_commands:
      - nansen research perp leaderboard
    expected_fragments:
      - "perp leaderboard"
      - "--days"
      - "7"
    skill: nansen-perp-screener

  # Wallet profiler: compare subcommand with --addresses (skill-specific workflow)
  - id: wallet_compare
    question: "Compare these two wallets: 0xabc123 and 0xdef456 on Ethereum"
    expected_commands:
      - nansen research profiler compare
    expected_fragments:
      - "profiler compare"
      - "--addresses"
      - "0xabc123"
      - "0xdef456"
    skill: nansen-wallet-profiler

  # Trading: base unit amounts (skill has decimal table, help doesn't explain conversions)
  - id: swap_sol_to_usdc
    question: Swap 1 SOL to USDC on Solana
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "solana"
      - "--from"
      - "SOL"
      - "--to"
      - "USDC"
      - "--amount"
      - "1000000000"
    skill: nansen-trading

  # Token screener: --smart-money flag (not in --help)
  - id: smart_money_screener
    question: What tokens are smart money trading on Solana right now?
    expected_commands:
      - nansen research token screener
    expected_fragments:
      - "token screener"
      - "--smart-money"
      - "--chain"
      - "solana"
    skill: nansen-token-screener

  # Wallet profiler: batch with --include (skill-specific)
  - id: batch_profile
    question: Get labels and balances for these addresses in one call — 0xaaa, 0xbbb, 0xccc on Ethereum
    expected_commands:
      - nansen research profiler batch
    expected_fragments:
      - "profiler batch"
      - "--addresses"
      - "--include"
      - "labels"
      - "balance"
      - "--chain"
      - "ethereum"
    skill: nansen-wallet-batch

  # Wallet profiler: trace with --depth and --width (skill-specific)
  - id: wallet_trace
    question: Trace the counterparty network of 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045 on Ethereum, 2 hops deep
    expected_commands:
      - nansen research profiler trace
    expected_fragments:
      - "profiler trace"
      - "--address"
      - "--depth"
      - "2"
      - "--chain"
      - "ethereum"
    skill: nansen-wallet-clustering

  # Token research: flow-intelligence (not a basic command)
  - id: token_flow_intelligence
    question: Break down the net flows for BONK by wallet type — whales, smart traders, exchanges
    expected_commands:
      - nansen research token flow-intelligence
    expected_fragments:
      - "token flow-intelligence"
      - "--token"
      - "--chain"
    skill: nansen-token-research

  # Prediction markets: event screener with sort (skill-specific)
  - id: polymarket_trending
    question: What are the hottest prediction markets by volume today?
    expected_commands:
      - nansen research pm event-screener
      - nansen research pm market-screener
      - nansen research prediction-market event-screener
      - nansen research prediction-market market-screener
    expected_fragments:
      - "event-screener"
      - "--sort-by"
      - "volume_24hr"
    skill: nansen-prediction-markets

  # Prediction markets: deep dive with market-id (skill-specific)
  - id: polymarket_top_holders
    question: Who are the biggest holders in Polymarket market 12345?
    expected_commands:
      - nansen research pm top-holders
      - nansen research prediction-market top-holders
    expected_fragments:
      - "top-holders"
      - "--market-id"
      - "12345"
    skill: nansen-polymarket-deep-dive

  # DCA tracker: smart-money dcas (skill-specific command)
  - id: smart_money_dcas
    question: What tokens are whales dollar-cost averaging into on Solana?
    expected_commands:
      - nansen research smart-money dcas
    expected_fragments:
      - "smart-money dcas"
      - "--chain"
      - "solana"
    skill: nansen-dca-tracker

  # Smart money: dex-trades with label filter (skill-specific)
  - id: smart_trader_dex_trades
    question: Show me real-time DEX trades by the best Solana traders
    expected_commands:
      - nansen research smart-money dex-trades
    expected_fragments:
      - "smart-money dex-trades"
      - "--chain"
      - "solana"
      - "--labels"
    skill: nansen-smart-money-tracker

  # Alerts: create with specific type and notification channel (skill-specific flags)
  - id: alert_create_sm_flows
    question: Create a Telegram alert for smart money token flows with over $1M inflow in 24h
    expected_commands:
      - nansen alerts create
    expected_fragments:
      - "alerts create"
      - "--type"
      - "sm-token-flows"
      - "--telegram"
      - "--inflow-1d-min"
    skill: nansen-smart-alerts

  # Token research: indicators (skill-specific subcommand)
  - id: token_indicators
    question: What are the Nansen risk and reward indicators for this Solana token 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU?
    expected_commands:
      - nansen research token indicators
    expected_fragments:
      - "token indicators"
      - "--token"
      - "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
      - "--chain"
      - "solana"
    skill: nansen-token-screener

  # Wallet profiler: perp-positions (no --chain, skill-specific)
  - id: wallet_perp_positions
    question: What are the open Hyperliquid perp positions for 0xabc123?
    expected_commands:
      - nansen research profiler perp-positions
    expected_fragments:
      - "profiler perp-positions"
      - "--address"
      - "0xabc123"
    skill: nansen-wallet-profiler

  # Token research: who-bought-sold (skill-specific subcommand)
  - id: who_bought_sold
    question: Which wallets have been buying and selling UNI on Ethereum recently?
    expected_commands:
      - nansen research token who-bought-sold
    expected_fragments:
      - "token who-bought-sold"
      - "--token"
      - "--chain"
      - "ethereum"
    skill: nansen-token-research

  # Smart money: historical holdings with --days (skill-specific)
  - id: sm_historical_holdings
    question: How have smart money holdings on Solana changed over the past month?
    expected_commands:
      - nansen research smart-money historical-holdings
    expected_fragments:
      - "smart-money historical-holdings"
      - "--chain"
      - "solana"
      - "--days"
      - "30"
    skill: nansen-smart-money-tracker

  # Trading: USD-intent amount (defensive — CLI only supports base units)
  - id: trade_usd_intent_solana
    question: Buy $20 worth of MPLX on Solana
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "solana"
      - "--amount"
    rejected_fragments:
      - "--amount 20"
      - "--amount 20 "
      - "--amount \"20\""
    notes: >
      The CLI only accepts base units (lamports/wei). Passing --amount 20 sends
      20 lamports (~$0.000000), not $20 USD. The agent must either convert to
      base units via a price lookup or warn that USD amounts aren't supported.
    skill: nansen-trading

  - id: trade_usd_intent_base
    question: I want to spend $25 of ETH to buy VIRTUAL on Base
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "base"
      - "--amount"
    rejected_fragments:
      - "--amount 25"
      - "--amount 25 "
      - "--amount \"25\""
    notes: >
      Same as above — 25 wei is effectively zero ETH. Agent must not pass raw
      dollar amounts as base units.
    skill: nansen-trading

  - id: trade_decimal_amount_eth
    question: Swap 0.1 ETH for USDC on Base
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "base"
      - "--from"
      - "--to"
      - "--amount"
      - "100000000000000000"
    rejected_fragments:
      - "--amount 0.1"
      - "--amount \"0.1\""
    notes: >
      0.1 ETH = 100000000000000000 wei (1e17). The CLI rejects decimals, but
      the agent should proactively convert to base units without trying decimals.
    skill: nansen-trading

  - id: trade_decimal_amount_sol
    question: Trade 0.5 SOL for USDC on Solana
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "solana"
      - "--from"
      - "SOL"
      - "--to"
      - "USDC"
      - "--amount"
      - "500000000"
    rejected_fragments:
      - "--amount 0.5"
      - "--amount \"0.5\""
    notes: >
      0.5 SOL = 500000000 lamports (5e8). Agent must convert fractional token
      amounts to base units.
    skill: nansen-trading

  # Trading: round whole-token amount must convert to base units
  - id: trade_whole_token_eth
    question: Buy 5 ETH worth of USDC on Base
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "base"
      - "--amount"
      - "5000000000000000000"
    rejected_fragments:
      - "--amount 5 "
      - "--amount 5\n"
      - "--amount \"5\""
    notes: >
      5 ETH = 5e18 wei. A round integer like 5 is the most common mistake —
      the agent must never pass it raw.
    skill: nansen-trading

  # Trading: USDC spend amount must convert to base units (6 decimals)
  - id: trade_usdc_spend
    question: Spend 100 USDC to buy SOL on Solana
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "solana"
      - "--from"
      - "USDC"
      - "--to"
      - "SOL"
      - "--amount"
      - "100000000"
    rejected_fragments:
      - "--amount 100 "
      - "--amount 100\n"
      - "--amount \"100\""
    notes: >
      100 USDC = 100,000,000 (1e8). Agent must know USDC has 6 decimals and
      convert accordingly. Passing 100 sends 0.0001 USDC.
    skill: nansen-trading

  # Trading: small USDC amount for meme token (common agent pattern)
  - id: trade_usdc_small_amount
    question: Buy 20 USDC of BONK on Solana
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "solana"
      - "--from"
      - "USDC"
      - "--to"
      - "--amount"
      - "20000000"
    rejected_fragments:
      - "--amount 20 "
      - "--amount 20\n"
      - "--amount \"20\""
    notes: >
      20 USDC = 20,000,000 (2e7). This mirrors the exact failure from the
      user report — small round number that looks correct but is off by 1e6.
    skill: nansen-trading

  # Trading: whole SOL amount (9 decimals)
  - id: trade_whole_token_sol
    question: Swap 2 SOL for USDC on Solana
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "solana"
      - "--from"
      - "SOL"
      - "--to"
      - "USDC"
      - "--amount"
      - "2000000000"
    rejected_fragments:
      - "--amount 2 "
      - "--amount 2\n"
      - "--amount \"2\""
    notes: >
      2 SOL = 2,000,000,000 lamports (2e9). Round SOL amounts are common
      and must be converted.
    skill: nansen-trading

  # Trading: must use `nansen trade`, not `nansen agent` (agent can't execute trades)
  - id: trade_not_agent
    question: Buy 0.1 ETH of USDC on Base
    expected_commands:
      - nansen trade quote
    expected_fragments:
      - "trade quote"
      - "--chain"
      - "base"
      - "--from"
      - "--to"
      - "--amount"
    rejected_fragments:
      - "nansen agent"
    notes: >
      The agent subcommand cannot execute trades — it gives app UI instructions
      instead. Trading requests must always route to `nansen trade quote`.
    skill: nansen-trading

  # Web search: multi-query (skill-specific pattern)
  - id: web_multi_search
    question: Search for both "ethereum ETF approval" and "solana ETF filing" at the same time
    expected_commands:
      - nansen web search
    expected_fragments:
      - "web search"
      - "--query"
      - "ethereum ETF"
      - "solana ETF"
    skill: nansen-web-searcher
