name: Sync Skills to ClawHub

on:
  workflow_dispatch: # manual trigger only — automatic sync runs via ci.yml publish job

jobs:
  sync-clawhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ClawHub
        run: npx --yes clawhub@0.9.0 login --token "$CLAWHUB_TOKEN" --no-browser
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Sync skills to ClawHub
        run: npx --yes clawhub@0.9.0 sync --all --workdir . --dir skills
